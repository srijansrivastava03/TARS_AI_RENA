name: agriscan
description: "AgriScan - AI Plant Disease Detection & Diagnosis"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.2
  shimmer: ^3.0.0
  cached_network_image: ^3.4.1

  # State Management
  provider: ^6.1.2

  # Navigation
  go_router: ^14.8.1

  # Networking
  http: ^1.3.0

  # Camera & Image
  camera: ^0.11.1
  image_picker: ^1.1.2

  # Storage
  shared_preferences: ^2.3.4
  path_provider: ^2.1.5
  path: ^1.9.1

  # Utils
  uuid: ^4.5.1
  intl: ^0.20.2
  permission_handler: ^11.3.1
  connectivity_plus: ^6.1.2
  flutter_tts: ^4.2.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/to/font-from-package
